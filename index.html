<!DOCTYPE html>
<html>
<head>
  <title>Market Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #070b10;
      --panel: #0f1721;
      --border: #223246;
      --text: #e8f0fa;
      --muted: #8fa3b8;
      --blue: #68a8ff;
      --red: #ff5a66;
      --green: #62d394;
      --purple: #b58cff;
      --orange: #ffb86b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 18px 20px;
      background: #0d141d;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 140px 140px 140px 140px 140px auto auto;
      gap: 10px;
      padding: 14px 20px;
      background: #091018;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 78px;
      z-index: 15;
    }

    input, select, button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      white-space: nowrap;
    }

    button.active {
      border-color: var(--red);
      color: #ffd1d5;
      background: #31141a;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 20px 0;
      max-width: 1200px;
      margin: auto;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .stat strong { color: var(--text); }

    .trending {
      padding: 12px 20px 0;
      max-width: 1200px;
      margin: auto;
    }

    .trend-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .trend {
      background: #17202d;
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #c8d8ea;
      cursor: pointer;
    }

    .feed {
      padding: 16px 20px 40px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      animation: fadeIn 0.25s ease;
    }

    .card.compact {
      padding: 11px 14px;
    }

    .urgent {
      border-color: var(--red);
      box-shadow: 0 0 0 1px #ff5a6633;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .tag {
      background: #1d2a3b;
      color: #bcd0e5;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .urgent-tag {
      background: #4a1e27;
      color: #ffb8be;
    }

    .source-tag {
      background: #172c46;
      color: #9dccff;
    }

    .topic-tag {
      background: #203022;
      color: #a8e6b2;
    }

    .ticker-tag {
      background: #30204a;
      color: var(--purple);
    }

    .region-tag {
      background: #403017;
      color: var(--orange);
    }

    .asset-tag {
      background: #173830;
      color: var(--green);
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .compact .title {
      font-size: 15px;
      margin-bottom: 6px;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .small {
      color: var(--muted);
      font-size: 12px;
      margin-top: 7px;
    }

    .empty {
      color: var(--muted);
      padding: 30px;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1000px) {
      header, .toolbar { position: static; }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Market Intelligence</h1>
    <div class="sub" id="status">Loading alerts...</div>
  </header>

  <section class="toolbar">
    <input id="search" placeholder="Search headline, ticker, region, asset..." />

    <select id="sourceFilter">
      <option value="">All sources</option>
    </select>

    <select id="topicFilter">
      <option value="">All topics</option>
    </select>

    <select id="tickerFilter">
      <option value="">All tickers</option>
    </select>

    <select id="regionFilter">
      <option value="">All regions</option>
    </select>

    <select id="assetFilter">
      <option value="">All assets</option>
    </select>

    <button id="urgentToggle">Urgent only</button>
    <button id="compactToggle">Compact</button>
  </section>

  <section class="stats" id="stats"></section>

  <section class="trending">
    <div class="trend-row" id="trends"></div>
  </section>

  <main class="feed" id="feed"></main>

  <script>
    const ALERTS_URL =
      "https://raw.githubusercontent.com/nathan545x/News/main/alerts.json";

    let allAlerts = [];
    let urgentOnly = false;
    let compactMode = false;

    const searchEl = document.getElementById("search");
    const sourceFilter = document.getElementById("sourceFilter");
    const topicFilter = document.getElementById("topicFilter");
    const tickerFilter = document.getElementById("tickerFilter");
    const regionFilter = document.getElementById("regionFilter");
    const assetFilter = document.getElementById("assetFilter");
    const urgentToggle = document.getElementById("urgentToggle");
    const compactToggle = document.getElementById("compactToggle");

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);

      if (mins < 1) return "just now";
      if (mins < 60) return mins + "m ago";

      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + "h ago";

      return Math.floor(hours / 24) + "d ago";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function valuesFrom(alerts, key) {
      const set = new Set();

      alerts.forEach(alert => {
        (alert[key] || []).forEach(v => set.add(v));
      });

      return [...set].sort();
    }

    function populateSelect(select, label, values, current) {
      select.innerHTML =
        `<option value="">${label}</option>` +
        values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");

      select.value = current;
    }

    function populateFilters(alerts) {
      const current = {
        source: sourceFilter.value,
        topic: topicFilter.value,
        ticker: tickerFilter.value,
        region: regionFilter.value,
        asset: assetFilter.value,
      };

      populateSelect(sourceFilter, "All sources", valuesFrom(alerts, "sources"), current.source);
      populateSelect(topicFilter, "All topics", valuesFrom(alerts, "topics"), current.topic);
      populateSelect(tickerFilter, "All tickers", valuesFrom(alerts, "tickers"), current.ticker);
      populateSelect(regionFilter, "All regions", valuesFrom(alerts, "regions"), current.region);
      populateSelect(assetFilter, "All assets", valuesFrom(alerts, "assets"), current.asset);
    }

    function buildText(alert) {
      return [
        alert.title,
        ...(alert.sources || []),
        ...(alert.topics || []),
        ...(alert.keywords || []),
        ...(alert.tickers || []),
        ...(alert.regions || []),
        ...(alert.assets || [])
      ].join(" ").toLowerCase();
    }

    function getFilteredAlerts() {
      const query = searchEl.value.toLowerCase().trim();

      return allAlerts.filter(alert => {
        if (urgentOnly && !alert.urgent) return false;

        if (sourceFilter.value && !(alert.sources || []).includes(sourceFilter.value)) return false;
        if (topicFilter.value && !(alert.topics || []).includes(topicFilter.value)) return false;
        if (tickerFilter.value && !(alert.tickers || []).includes(tickerFilter.value)) return false;
        if (regionFilter.value && !(alert.regions || []).includes(regionFilter.value)) return false;
        if (assetFilter.value && !(alert.assets || []).includes(assetFilter.value)) return false;

        if (query && !buildText(alert).includes(query)) return false;

        return true;
      });
    }

    function renderStats(alerts) {
      const urgent = alerts.filter(a => a.urgent).length;
      const sources = valuesFrom(alerts, "sources").length;
      const topics = valuesFrom(alerts, "topics").length;
      const tickers = valuesFrom(alerts, "tickers").length;
      const regions = valuesFrom(alerts, "regions").length;
      const assets = valuesFrom(alerts, "assets").length;

      const avgScore = alerts.length
        ? (alerts.reduce((sum, a) => sum + Number(a.score || 0), 0) / alerts.length).toFixed(1)
        : 0;

      document.getElementById("stats").innerHTML = `
        <div class="stat"><strong>${alerts.length}</strong> visible</div>
        <div class="stat"><strong>${urgent}</strong> urgent</div>
        <div class="stat"><strong>${sources}</strong> sources</div>
        <div class="stat"><strong>${topics}</strong> topics</div>
        <div class="stat"><strong>${tickers}</strong> tickers</div>
        <div class="stat"><strong>${regions}</strong> regions</div>
        <div class="stat"><strong>${assets}</strong> assets</div>
        <div class="stat"><strong>${avgScore}</strong> avg score</div>
      `;
    }

    function renderTrending(alerts) {
      const counts = {};

      alerts.forEach(alert => {
        [
          ...(alert.keywords || []),
          ...(alert.tickers || []),
          ...(alert.regions || []),
          ...(alert.assets || [])
        ].forEach(k => {
          counts[k] = (counts[k] || 0) + 1;
        });
      });

      const top = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 16);

      document.getElementById("trends").innerHTML = top.map(([word, count]) => `
        <span class="trend" onclick="setSearch('${escapeHtml(word)}')">${escapeHtml(word)} · ${count}</span>
      `).join("");
    }

    function setSearch(word) {
      searchEl.value = word;
      render();
    }

    function tags(values, cls) {
      return (values || []).map(v =>
        `<span class="tag ${cls}">${escapeHtml(v)}</span>`
      ).join("");
    }

    function render() {
      const alerts = getFilteredAlerts();
      const feed = document.getElementById("feed");
      const status = document.getElementById("status");

      renderStats(alerts);
      renderTrending(alerts);

      status.textContent =
        `${allAlerts.length} total alerts · ${alerts.length} shown · updated ${new Date().toLocaleTimeString()}`;

      if (!alerts.length) {
        feed.innerHTML = `<div class="empty">No matching alerts.</div>`;
        return;
      }

      feed.innerHTML = alerts.map(alert => {
        const urgentClass = alert.urgent ? "urgent" : "";
        const compactClass = compactMode ? "compact" : "";

        return `
          <article class="card ${urgentClass} ${compactClass}">
            <div class="meta">
              ${alert.urgent ? `<span class="tag urgent-tag">URGENT</span>` : ""}
              ${tags(alert.sources, "source-tag")}
              <span class="tag">Score ${escapeHtml(alert.score)}</span>
              ${tags(alert.topics, "topic-tag")}
              ${tags(alert.tickers, "ticker-tag")}
              ${tags(alert.regions, "region-tag")}
              ${tags(alert.assets, "asset-tag")}
            </div>

            <div class="title">
              <a href="${escapeHtml(alert.link)}" target="_blank" rel="noopener">
                ${escapeHtml(alert.title)}
              </a>
            </div>

            ${compactMode ? "" : `
              <div class="small">Keywords: ${escapeHtml((alert.keywords || []).join(", ") || "none")}</div>
              <div class="small">${timeAgo(alert.time)} · ${escapeHtml(alert.source_count || 1)} source(s)</div>
            `}
          </article>
        `;
      }).join("");
    }

    async function loadAlerts() {
      try {
        const res = await fetch(ALERTS_URL + "?t=" + Date.now());
        allAlerts = await res.json();

        allAlerts.sort((a, b) => {
          if (b.urgent !== a.urgent) return b.urgent - a.urgent;
          return Number(b.score || 0) - Number(a.score || 0);
        });

        populateFilters(allAlerts);
        render();
      } catch (err) {
        document.getElementById("feed").innerHTML =
          `<div class="empty">Failed to load alerts.</div>`;
      }
    }

    searchEl.addEventListener("input", render);
    sourceFilter.addEventListener("change", render);
    topicFilter.addEventListener("change", render);
    tickerFilter.addEventListener("change", render);
    regionFilter.addEventListener("change", render);
    assetFilter.addEventListener("change", render);

    urgentToggle.addEventListener("click", () => {
      urgentOnly = !urgentOnly;
      urgentToggle.classList.toggle("active", urgentOnly);
      render();
    });

    compactToggle.addEventListener("click", () => {
      compactMode = !compactMode;
      compactToggle.classList.toggle("active", compactMode);
      render();
    });

    loadAlerts();
    setInterval(loadAlerts, 15000);
  </script>
</body>
</html>
