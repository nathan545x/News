<!DOCTYPE html>
<html>
<head>
  <title>Market OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #05070b;
      --panel: #0c111a;
      --panel2: #111827;
      --border: #222c3d;
      --text: #e7eefc;
      --muted: #7f8ea3;
      --blue: #65a7ff;
      --red: #ff5061;
      --orange: #ffb86b;
      --green: #65d98b;
      --purple: #b58cff;
      --yellow: #f6d365;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: #090d14;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 340px;
      min-height: calc(100vh - 56px);
    }

    aside, .right {
      border-right: 1px solid var(--border);
      background: #070b11;
      padding: 12px;
    }

    .right {
      border-right: 0;
      border-left: 1px solid var(--border);
    }

    main {
      padding: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .panel-title {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #c4d5ef;
      text-transform: uppercase;
    }

    .panel-body {
      padding: 10px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 120px 120px 120px 120px;
      gap: 8px;
      margin-bottom: 12px;
    }

    input, select, button {
      background: #0b121d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 12px;
    }

    button {
      cursor: pointer;
    }

    button.active {
      background: #32161d;
      border-color: var(--red);
      color: #ffc7cc;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .alert {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .alert.CRITICAL {
      border-color: var(--red);
      box-shadow: 0 0 0 1px #ff506133;
    }

    .alert.HIGH {
      border-color: #ff9c50;
    }

    .headline {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin: 6px 0;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 5px;
    }

    .tag {
      padding: 3px 6px;
      border-radius: 999px;
      background: #1b2636;
      color: #bad0ea;
      font-size: 11px;
    }

    .severity-CRITICAL { background: #4a1620; color: #ffb8c0; }
    .severity-HIGH { background: #4a2a16; color: #ffd0a3; }
    .severity-MEDIUM { background: #403814; color: #f6e29b; }
    .severity-LOW { background: #1d2b22; color: #a8e6b2; }

    .regime { background: #261d44; color: var(--purple); }
    .ticker { background: #30204a; color: var(--purple); }
    .region { background: #3a2a13; color: var(--orange); }
    .asset { background: #14342b; color: var(--green); }

    .small {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #182234;
      padding: 6px 0;
      font-size: 12px;
    }

    .metric:last-child {
      border-bottom: 0;
    }

    .pill-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .calendar-item {
      border-bottom: 1px solid #182234;
      padding: 8px 0;
    }

    .calendar-item:last-child {
      border-bottom: 0;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside, .right {
        border: 0;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>MARKET OS</h1>
    <div class="status" id="status">Loading...</div>
  </header>

  <div class="layout">
    <aside>
      <div class="panel">
        <div class="panel-title">Macro Regime</div>
        <div class="panel-body" id="regimePanel"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Market Snapshot</div>
        <div class="panel-body" id="snapshotPanel"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Top Regions</div>
        <div class="panel-body" id="regionsPanel"></div>
      </div>
    </aside>

    <main>
      <div class="toolbar">
        <input id="search" placeholder="Search macro, region, asset, source..." />

        <select id="severityFilter">
          <option value="">All severity</option>
        </select>

        <select id="regimeFilter">
          <option value="">All regimes</option>
        </select>

        <select id="regionFilter">
          <option value="">All regions</option>
        </select>

        <button id="urgentToggle">Urgent only</button>
      </div>

      <div class="feed" id="feed"></div>
    </main>

    <section class="right">
      <div class="panel">
        <div class="panel-title">Macro Calendar / Event Watch</div>
        <div class="panel-body" id="calendarPanel"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Trending Tags</div>
        <div class="panel-body">
          <div class="pill-row" id="trendsPanel"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Sources</div>
        <div class="panel-body" id="sourcesPanel"></div>
      </div>
    </section>
  </div>

  <script>
    const ALERTS_URL = "https://raw.githubusercontent.com/nathan545x/News/main/alerts.json";

    let allAlerts = [];
    let urgentOnly = false;

    const searchEl = document.getElementById("search");
    const severityFilter = document.getElementById("severityFilter");
    const regimeFilter = document.getElementById("regimeFilter");
    const regionFilter = document.getElementById("regionFilter");
    const urgentToggle = document.getElementById("urgentToggle");

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return mins + "m ago";
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + "h ago";
      return Math.floor(hrs / 24) + "d ago";
    }

    function countValues(alerts, key) {
      const counts = {};
      alerts.forEach(a => {
        (a[key] || []).forEach(v => counts[v] = (counts[v] || 0) + 1);
      });
      return counts;
    }

    function values(alerts, key) {
      return Object.keys(countValues(alerts, key)).sort();
    }

    function populateSelect(el, label, vals) {
      const current = el.value;
      el.innerHTML = `<option value="">${label}</option>` +
        vals.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
      el.value = current;
    }

    function populateFilters() {
      populateSelect(severityFilter, "All severity", [...new Set(allAlerts.map(a => a.severity || "LOW"))].sort());
      populateSelect(regimeFilter, "All regimes", values(allAlerts, "regime_tags"));
      populateSelect(regionFilter, "All regions", values(allAlerts, "regions"));
    }

    function buildText(a) {
      return [
        a.title,
        a.severity,
        ...(a.sources || []),
        ...(a.regime_tags || []),
        ...(a.topics || []),
        ...(a.keywords || []),
        ...(a.tickers || []),
        ...(a.regions || []),
        ...(a.assets || [])
      ].join(" ").toLowerCase();
    }

    function filteredAlerts() {
      const q = searchEl.value.toLowerCase().trim();

      return allAlerts.filter(a => {
        if (urgentOnly && !a.urgent) return false;
        if (severityFilter.value && a.severity !== severityFilter.value) return false;
        if (regimeFilter.value && !(a.regime_tags || []).includes(regimeFilter.value)) return false;
        if (regionFilter.value && !(a.regions || []).includes(regionFilter.value)) return false;
        if (q && !buildText(a).includes(q)) return false;
        return true;
      });
    }

    function tag(v, cls = "") {
      return `<span class="tag ${cls}">${escapeHtml(v)}</span>`;
    }

    function tagList(values, cls = "") {
      return (values || []).map(v => tag(v, cls)).join("");
    }

    function renderFeed(alerts) {
      const feed = document.getElementById("feed");

      if (!alerts.length) {
        feed.innerHTML = `<div class="empty">No matching alerts.</div>`;
        return;
      }

      feed.innerHTML = alerts.map(a => `
        <article class="alert ${escapeHtml(a.severity || "LOW")}">
          <div class="tags">
            ${tag(a.severity || "LOW", "severity-" + (a.severity || "LOW"))}
            ${tagList(a.regime_tags, "regime")}
            ${tagList(a.sources)}
            ${tagList(a.tickers, "ticker")}
            ${tagList(a.regions, "region")}
            ${tagList(a.assets, "asset")}
          </div>

          <div class="headline">
            <a href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
              ${escapeHtml(a.title)}
            </a>
          </div>

          <div class="small">
            Score ${escapeHtml(a.score)} · ${timeAgo(a.time)} · ${escapeHtml(a.source_count || 1)} source(s)
          </div>

          <div class="small">
            Keywords: ${escapeHtml((a.keywords || []).join(", ") || "none")}
          </div>
        </article>
      `).join("");
    }

    function renderRegime(alerts) {
      const counts = countValues(alerts, "regime_tags");
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

      document.getElementById("regimePanel").innerHTML = sorted.length
        ? sorted.map(([k, v]) => `<div class="metric"><span>${escapeHtml(k)}</span><strong>${v}</strong></div>`).join("")
        : `<div class="empty">No regime data.</div>`;
    }

    function renderSnapshot(alerts) {
      const critical = alerts.filter(a => a.severity === "CRITICAL").length;
      const high = alerts.filter(a => a.severity === "HIGH").length;
      const macro = alerts.filter(a => (a.regime_tags || []).includes("RATES")).length;
      const geo = alerts.filter(a => (a.regime_tags || []).includes("GEO-SHOCK")).length;

      document.getElementById("snapshotPanel").innerHTML = `
        <div class="metric"><span>Total alerts</span><strong>${alerts.length}</strong></div>
        <div class="metric"><span>Critical</span><strong>${critical}</strong></div>
        <div class="metric"><span>High</span><strong>${high}</strong></div>
        <div class="metric"><span>Rates watch</span><strong>${macro}</strong></div>
        <div class="metric"><span>Geo shock</span><strong>${geo}</strong></div>
      `;
    }

    function renderRegions(alerts) {
      const counts = countValues(alerts, "regions");
      const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);

      document.getElementById("regionsPanel").innerHTML = top.length
        ? top.map(([k, v]) => `<div class="metric"><span>${escapeHtml(k)}</span><strong>${v}</strong></div>`).join("")
        : `<div class="empty">No region data.</div>`;
    }

    function renderCalendar(alerts) {
      const events = alerts.filter(a => a.macro_calendar || (a.macro_events || []).length);

      document.getElementById("calendarPanel").innerHTML = events.length
        ? events.slice(0, 12).map(a => `
          <div class="calendar-item">
            <div><strong>${escapeHtml(a.title)}</strong></div>
            <div class="small">${escapeHtml((a.macro_events || []).map(e => e.name).join(", ") || "Macro watch")}</div>
            <div class="small">${timeAgo(a.time)} · ${escapeHtml((a.regions || []).join(", "))}</div>
          </div>
        `).join("")
        : `<div class="empty">No macro calendar events detected.</div>`;
    }

    function renderTrends(alerts) {
      const counts = {};
      alerts.forEach(a => {
        [
          ...(a.regime_tags || []),
          ...(a.keywords || []),
          ...(a.regions || []),
          ...(a.assets || [])
        ].forEach(k => counts[k] = (counts[k] || 0) + 1);
      });

      const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 20);

      document.getElementById("trendsPanel").innerHTML = top
        .map(([k, v]) => `<span class="tag" onclick="setSearch('${escapeHtml(k)}')">${escapeHtml(k)} · ${v}</span>`)
        .join("");
    }

    function renderSources(alerts) {
      const counts = countValues(alerts, "sources");
      const top = Object.entries(counts).sort((a, b) => b[1] - a[1]);

      document.getElementById("sourcesPanel").innerHTML = top.length
        ? top.map(([k, v]) => `<div class="metric"><span>${escapeHtml(k)}</span><strong>${v}</strong></div>`).join("")
        : `<div class="empty">No source data.</div>`;
    }

    function setSearch(value) {
      searchEl.value = value;
      render();
    }

    function render() {
      const alerts = filteredAlerts();

      renderFeed(alerts);
      renderRegime(allAlerts);
      renderSnapshot(allAlerts);
      renderRegions(allAlerts);
      renderCalendar(allAlerts);
      renderTrends(allAlerts);
      renderSources(allAlerts);

      document.getElementById("status").textContent =
        `${allAlerts.length} alerts · ${alerts.length} shown · updated ${new Date().toLocaleTimeString()}`;
    }

    async function loadAlerts() {
      try {
        const res = await fetch(ALERTS_URL + "?t=" + Date.now());
        allAlerts = await res.json();

        allAlerts.sort((a, b) => {
          const sev = { CRITICAL: 4, HIGH: 3, MEDIUM: 2, LOW: 1 };
          return (sev[b.severity] || 0) - (sev[a.severity] || 0)
            || Number(b.score || 0) - Number(a.score || 0);
        });

        populateFilters();
        render();
      } catch (e) {
        document.getElementById("feed").innerHTML = `<div class="empty">Failed to load alerts.</div>`;
      }
    }

    searchEl.addEventListener("input", render);
    severityFilter.addEventListener("change", render);
    regimeFilter.addEventListener("change", render);
    regionFilter.addEventListener("change", render);

    urgentToggle.addEventListener("click", () => {
      urgentOnly = !urgentOnly;
      urgentToggle.classList.toggle("active", urgentOnly);
      render();
    });

    loadAlerts();
    setInterval(loadAlerts, 15000);
  </script>
</body>
</html>
