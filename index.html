
<!DOCTYPE html>
<html>
<head>
<title>Institutional Macro Terminal</title>
<style>
body{background:#050505;color:#ddd;font-family:Consolas;margin:0}
.header{padding:15px;background:#0b0f14;border-bottom:1px solid #222}
.title{color:#00ff88;font-size:24px}
.grid{display:grid;grid-template-columns:1fr 2fr;gap:10px;padding:10px}
.panel{border:1px solid #222;background:#0b0f14}
.panel h2{margin:0;padding:10px;border-bottom:1px solid #222;color:#00d5ff;font-size:12px}
.card{padding:10px;border-bottom:1px solid #151515}
</style>
</head>
<body>

<div class="header">
<div class="title">INSTITUTIONAL MACRO TERMINAL</div>
</div>

<div class="grid">
<div class="panel">
<h2>TOP SIGNALS</h2>
<div id="top"></div>
</div>

<div class="panel">
<h2>RECENT NEWS</h2>
<div id="news"></div>
</div>
</div>

<script>
async function load(){
 const r = await fetch('./alerts.json?v='+Date.now());
 const d = await r.json();

 document.getElementById('top').innerHTML =
   (d.top_signals || []).map(render).join('');

 document.getElementById('news').innerHTML =
   (d.alerts || []).map(render).join('');
}

function render(x){
 return `
  <div class="card">
   <div>${x.severity} | ${x.regime}</div>
   <div><a href="${x.link}" target="_blank">${x.title}</a></div>
   <div>${x.source} | Score ${x.score}</div>
  </div>
 `;
}

load();
setInterval(load,60000);
</script>

</body>
</html>
