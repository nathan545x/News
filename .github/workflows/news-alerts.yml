name: Multi-Source Trading Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run alert engine
        run: python rss_notify.py
