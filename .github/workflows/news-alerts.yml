
name: Macro RSS Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-rss:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run RSS Engine
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python rss_notify.py

      - name: Commit alerts.json
        run: |

          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add alerts.json seen.json

          git diff --cached --quiet || git commit -m "update alerts"

      - name: Force Push Generated Files
        run: |
          git push origin HEAD:master --force-with-lease
