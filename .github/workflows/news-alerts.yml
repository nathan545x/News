name: Cognito Style Market Intelligence

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run intelligence engine
        run: python rss_notify.py

      - name: Save state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen.json alerts.json
          git commit -m "Update alert state" || echo "No changes"
          git push
