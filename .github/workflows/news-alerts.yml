name: Multi-Source Trading Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run alert engine
        run: python rss_notify.py

      - name: Save seen state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen.json
          git commit -m "Update seen alerts" || echo "No changes to commit"
          git push
